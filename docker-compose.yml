version: "3.8"

services:
  # Redis service for conversation state management
  redis:
    image: redis:7-alpine
    container_name: etax-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - etax-network

  # Telegram bot service
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etax-telegram-bot
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - INTERNAL_API_KEY=${SIGNING_SERVICE_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - INVOICE_SERVICE_URL=${INVOICE_SERVICE_URL:-http://etax:9443/api/v1/xml}
      - SETTINGS_SERVICE_URL=${SETTINGS_SERVICE_URL:-http://etax:9443/api/v1/settings}
      - CONVERSATION_TIMEOUT=${CONVERSATION_TIMEOUT:-3600}
      - INVOICE_HISTORY_TTL=${INVOICE_HISTORY_TTL:-86400}
      - MAX_RETRY_ATTEMPTS=${MAX_RETRY_ATTEMPTS:-3}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
    networks:
      - etax-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  etax-network:
    external: true
    name: etax-network

volumes:
  redis_data:
    driver: local
